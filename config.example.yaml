listen:
  dns: ":53"
  http: ":80"
  https: ":443"

# The public IP of this server. Handed out for domains in the smart-routed
# list below, so subsequent HTTP/HTTPS connections land back on this proxy.
public_ip: "203.0.113.10"

# DNS servers used to (a) resolve non-smart-routed queries and (b) look up
# the real origin IP of smart-routed domains before proxying traffic to them.
upstream_dns:
  - "1.1.1.1:53"
  - "8.8.8.8:53"

# Domains handled by this smart DNS, and the allowlist of client IPs/CIDRs
# permitted to use it, each live in their own plain-text file (one entry per
# line) so they're easy to edit or hand to `smartdns add-domain` /
# `smartdns add-ip` without touching the rest of this config. Paths are
# resolved relative to this file if not absolute. See domains.example.txt
# and allowed_ips.example.txt.
domains_file: domains.txt
allowed_cidrs_file: allowed_ips.txt

# Optional: lets allowlisted Telegram admins add domains/IPs remotely by
# messaging the bot with /add_domain <domain>, /add_ip <ip-or-cidr>, or
# /list. Leave token empty (or omit this section) to disable the bot
# entirely. Get a token from @BotFather and admin user IDs from
# @userinfobot.
telegram_bot:
  token: ""
  admin_ids: []

# Copy this file to config.yaml and fill in your real values.
# config.yaml is gitignored so your real public IP / client allowlist never
# ends up in version control.
